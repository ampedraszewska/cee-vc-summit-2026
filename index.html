<style>
  /* ── DESIGN TOKENS ── */
  :root {
    --bg:          #090116;
    --bg-raised:   #0e0220;
    --border:      rgba(255,255,255,0.07);
    --accent:      #faff00;
    --accent-dim:  rgba(250,255,0,0.08);
    --text:        #ffffff;
    --text-muted:  #c0b4d8;
    --text-dim:    #6b5f80;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Space Grotesk', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    font-size: 14px;
    min-height: 100vh;
  }

  /* ── HEADER ── */
  .header {
    background: var(--bg);
    border-bottom: 1px solid var(--border);
    padding: 0 32px;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .header-inner {
    max-width: 1440px;
    margin: 0 auto;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 64px;
    gap: 16px;
  }
  .header-left  { display: flex; align-items: center; gap: 14px; }
  .header-right { display: flex; align-items: center; gap: 24px; }
  .header-sep { width: 1px; height: 16px; background: rgba(255,255,255,0.15); }

  .event-tag {
    font-size: 10px;
    font-weight: 700;
    color: #090116;
    background: var(--accent);
    padding: 3px 9px;
    border-radius: 4px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    white-space: nowrap;
  }
  .title {
    font-size: 15px;
    font-weight: 600;
    color: var(--text);
  }

  /* Curated by Vastpoint */
  .curated-by {
    display: flex;
    align-items: center;
    gap: 7px;
  }
  .curated-label {
    font-size: 12px;
    font-weight: 400;
    color: var(--text-muted);
    white-space: nowrap;
  }
  .vp-wordmark {
    display: flex;
    align-items: center;
    text-decoration: none;
    opacity: 0.85;
    transition: opacity 0.15s;
  }
  .vp-wordmark:hover { opacity: 1; }
  .vp-wordmark svg { height: 16px; width: auto; display: block; }

  .count-badge { font-size: 12px; color: var(--text-muted); white-space: nowrap; }

  /* ── TOOLBAR ── */
  .toolbar {
    background: var(--bg-raised);
    border-bottom: 1px solid var(--border);
    padding: 10px 32px;
    position: sticky;
    top: 64px;
    z-index: 99;
  }
  .toolbar-inner {
    max-width: 1440px;
    margin: 0 auto;
    display: flex;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
  }
  .search-wrap { position: relative; flex: 0 0 260px; }
  .search-wrap svg {
    position: absolute; left: 10px; top: 50%;
    transform: translateY(-50%);
    color: var(--text-dim);
    pointer-events: none;
  }
  .search {
    width: 100%;
    padding: 7px 10px 7px 32px;
    border: 1px solid rgba(255,255,255,0.10);
    border-radius: 6px;
    font-size: 13px;
    font-family: inherit;
    color: var(--text);
    background: rgba(255,255,255,0.04);
    outline: none;
    transition: border-color 0.15s;
  }
  .search::placeholder { color: var(--text-dim); }
  .search:focus { border-color: var(--accent); background: rgba(255,255,255,0.06); }

  .filter-group { display: flex; gap: 5px; align-items: center; flex-wrap: wrap; }
  .filter-label {
    font-size: 10px;
    font-weight: 600;
    color: var(--text-dim);
    letter-spacing: 0.06em;
    text-transform: uppercase;
    margin-right: 2px;
  }
  .filter-btn {
    font-size: 12px;
    font-weight: 500;
    padding: 5px 10px;
    border-radius: 5px;
    border: 1px solid rgba(255,255,255,0.10);
    background: rgba(255,255,255,0.03);
    cursor: pointer;
    color: var(--text-muted);
    transition: all .15s;
    font-family: inherit;
  }
  .filter-btn:hover {
    border-color: rgba(250,255,0,0.35);
    color: var(--accent);
    background: var(--accent-dim);
  }
  .filter-btn.active {
    background: var(--accent);
    color: #090116;
    border-color: var(--accent);
    font-weight: 700;
  }
  .divider { width: 1px; height: 20px; background: var(--border); margin: 0 4px; flex-shrink: 0; }
  .clear-btn {
    font-size: 12px;
    color: var(--text-dim);
    cursor: pointer;
    padding: 4px 8px;
    border-radius: 4px;
    border: none;
    background: none;
    font-family: inherit;
    transition: all 0.15s;
  }
  .clear-btn:hover { color: var(--text-muted); background: rgba(255,255,255,0.04); }

  /* ── TABLE ── */
  .table-wrap { max-width: 1440px; margin: 24px auto; padding: 0 32px 48px; }
  .table {
    width: 100%;
    border-collapse: collapse;
    background: var(--bg-raised);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 4px 40px rgba(0,0,0,0.5);
  }
  thead th {
    background: rgba(255,255,255,0.025);
    padding: 10px 16px;
    text-align: left;
    font-size: 10px;
    font-weight: 600;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    border-bottom: 1px solid var(--border);
    white-space: nowrap;
    user-select: none;
  }
  thead th.sortable { cursor: pointer; }
  thead th.sortable:hover { color: var(--accent); background: var(--accent-dim); }
  thead th.sorted-asc  .sort-icon::after { content: '↑'; }
  thead th.sorted-desc .sort-icon::after { content: '↓'; }
  .sort-icon { display: inline-block; color: var(--accent); margin-left: 4px; font-size: 10px; }
  .sort-icon::after { content: '↕'; color: var(--text-dim); }
  tbody tr { border-bottom: 1px solid rgba(255,255,255,0.04); transition: background .1s; }
  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: rgba(250,255,0,0.02); }
  tbody td { padding: 12px 16px; vertical-align: top; }
  .hidden { display: none; }

  /* ── FUND CELL ── */
  .cell-fund { display: flex; align-items: flex-start; gap: 10px; min-width: 180px; }
  .fund-avatar {
    width: 34px; height: 34px;
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 700; color: white;
    flex-shrink: 0; margin-top: 1px;
    opacity: 0.85;
  }
  .fund-name { font-weight: 600; color: var(--text); font-size: 13px; line-height: 1.35; }
  .fund-link { color: var(--text); text-decoration: none; font-weight: 600; }
  .fund-link:hover { color: var(--accent); }

  /* ── FUND SIZE ── */
  .cell-size { font-size: 12.5px; font-weight: 600; color: var(--accent); white-space: nowrap; padding-top: 3px; }
  .cell-size.no-size { color: var(--text-dim); font-weight: 400; font-size: 12px; }

  /* ── REPS ── */
  .cell-reps { min-width: 200px; display: flex; flex-direction: column; gap: 0; }
  .rep-entry { padding: 3px 0; }
  .rep-entry + .rep-entry { border-top: 1px dashed rgba(255,255,255,0.06); margin-top: 5px; padding-top: 5px; }
  .rep-name  { font-weight: 500; color: var(--text); font-size: 13px; line-height: 1.3; }
  .rep-title { font-size: 11px; color: var(--text-muted); margin-top: 1px; }

  /* ── GEO / FOCUS ── */
  .cell-geo   { font-size: 11.5px; color: var(--text-muted); }
  .cell-focus { font-size: 11.5px; color: var(--text-muted); max-width: 200px; }

  /* ── STAGE TAGS ── */
  .tags { display: flex; gap: 4px; flex-wrap: wrap; }
  .tag { font-size: 10.5px; font-weight: 500; padding: 2px 7px; border-radius: 4px; white-space: nowrap; }

  .tag-preseed { background: rgba(20,175,125,0.08); color: #3dcda0; border: 1px solid rgba(20,175,125,0.12); }
  .tag-a       { background: rgba(59,130,246,0.12); color: #60a5fa; border: 1px solid rgba(59,130,246,0.18); }
  .tag-b       { background: rgba(139,92,246,0.12); color: #a78bfa; border: 1px solid rgba(139,92,246,0.18); }
  .tag-growth  { background: rgba(236,72,153,0.10); color: #f472b6; border: 1px solid rgba(236,72,153,0.15); }
  .tag-fof     { background: rgba(250,255,0,0.10); color: var(--accent); border: 1px solid rgba(250,255,0,0.18); }
  .tag-impact  { background: rgba(52,211,153,0.10); color: #34d399; border: 1px solid rgba(52,211,153,0.15); }

  .badge-yes { background: rgba(250,255,0,0.12); color: var(--accent); border: 1px solid rgba(250,255,0,0.2); }
  .badge-no  { background: rgba(255,255,255,0.04); color: var(--text-dim); }

  .no-results { text-align: center; padding: 60px; color: var(--text-dim); font-size: 14px; }

  /* ── FOOTER ── */
  .page-footer {
    text-align: center;
    padding: 20px;
    font-size: 12px;
    color: var(--text-dim);
    border-top: 1px solid var(--border);
    background: var(--bg);
  }
  .page-footer a { color: var(--accent); text-decoration: none; font-weight: 600; }
  .page-footer a:hover { text-decoration: underline; }
</style>
</head>

// Deduplicate by fund name (EIF was duplicated above — keep unique)
const seen = new Set();
const fundsUniq = funds.filter(f => { if (seen.has(f.fund)) return false; seen.add(f.fund); return true; });

const stageTagClass = { "Pre-seed":"preseed","Seed":"seed","Series A":"a","Series B":"b","Growth":"growth","Fund of Funds":"fof" };

function getInitials(name) {
  return name.split(' ').filter(w=>w).map(w=>w[0]).join('').slice(0,2).toUpperCase();
}

function renderStages(stages) {
  return stages.map(s => {
    const cls = stageTagClass[s] || 'a';
    return `<span class="tag tag-${cls}">${s}</span>`;
  }).join('');
}

function renderReps(reps) {
  return reps.map(r =>
    `<div class="rep-entry"><div class="rep-name">${r.name}</div><div class="rep-title">${r.title}</div></div>`
  ).join('');
}

// Sort state
let sortKey = 'name';
let sortDir = 'asc';

const activeFilters = { stage: new Set(), geo: new Set(), confirmed: new Set() };

function toggleFilter(btn) {
  const type = btn.dataset.filter;
  const val = btn.dataset.value;
  if (activeFilters[type].has(val)) { activeFilters[type].delete(val); btn.classList.remove('active'); }
  else { activeFilters[type].add(val); btn.classList.add('active'); }
  renderTable();
}

function clearFilters() {
  activeFilters.stage.clear(); activeFilters.geo.clear(); activeFilters.confirmed.clear();
  document.querySelectorAll('.filter-btn.active').forEach(b => b.classList.remove('active'));
  document.getElementById('searchInput').value = '';
  renderTable();
}

function applyFilters() { renderTable(); }

function sortBy(key) {
  if (sortKey === key) { sortDir = sortDir === 'asc' ? 'desc' : 'asc'; }
  else { sortKey = key; sortDir = 'asc'; }
  updateSortHeaders();
  renderTable();
}

function updateSortHeaders() {
  ['name','size'].forEach(k => {
    const th = document.getElementById('th-' + k);
    const si = document.getElementById('si-' + k);
    th.classList.remove('sorted-asc','sorted-desc');
    if (sortKey === k) {
      th.classList.add(sortDir === 'asc' ? 'sorted-asc' : 'sorted-desc');
    }
  });
}

function getFilteredSorted() {
  const q = document.getElementById('searchInput').value.toLowerCase();

  let result = fundsUniq.filter(f => {
    const repText = f.reps.map(r => r.name.toLowerCase() + ' ' + r.title.toLowerCase()).join(' ');
    const matchQ = !q ||
      f.fund.toLowerCase().includes(q) ||
      repText.includes(q) ||
      f.focus.toLowerCase().includes(q);
    const matchStage = activeFilters.stage.size === 0 || f.stages.some(s => activeFilters.stage.has(s));
    const matchGeo   = activeFilters.geo.size   === 0 || f.geoTags.some(g => activeFilters.geo.has(g));
    const matchConf  = activeFilters.confirmed.size === 0 || (activeFilters.confirmed.has('yes') && f.confirmed2026);
    return matchQ && matchStage && matchGeo && matchConf;
  });

  result.sort((a, b) => {
    if (sortKey === 'name') {
      const va = a.fund.toLowerCase(), vb = b.fund.toLowerCase();
      return sortDir === 'asc' ? va.localeCompare(vb) : vb.localeCompare(va);
    } else {
      // size: unknowns always last
      const va = a.sizeN, vb = b.sizeN;
      if (va === -1 && vb === -1) return a.fund.localeCompare(b.fund);
      if (va === -1) return 1;
      if (vb === -1) return -1;
      return sortDir === 'asc' ? va - vb : vb - va;
    }
  });
  return result;
}

function renderTable() {
  const data = getFilteredSorted();
  const tbody = document.getElementById('tableBody');

  tbody.innerHTML = data.map(f => `
    <tr>
      <td>
        <div class="cell-fund">
          <div class="fund-avatar" style="background:${f.color}">${getInitials(f.fund)}</div>
          <div class="fund-name">${f.website ? `<a href="${f.website}" target="_blank" rel="noopener" class="fund-link">${f.fund}</a>` : f.fund}</div>
        </div>
      </td>
      <td>
        ${f.size !== '-'
          ? `<span class="cell-size">${f.size}</span>`
          : `<span class="cell-size no-size">—</span>`}
      </td>
      <td class="cell-reps">${renderReps(f.reps)}</td>
      <td><div class="tags">${renderStages(f.stages)}</div></td>
      <td class="cell-focus">${f.focus}</td>
      <td class="cell-geo">${f.geo}</td>
      <td>${f.confirmed2026
        ? '<span class="badge-confirmed badge-yes">✓ Yes</span>'
        : '<span class="badge-confirmed badge-no">—</span>'}</td>
    </tr>
  `).join('');

  document.getElementById('visibleCount').textContent = data.length;
  const empty = data.length === 0;
  document.getElementById('noResults').classList.toggle('hidden', !empty);
  document.getElementById('mainTable').style.display = empty ? 'none' : '';
}

updateSortHeaders();
renderTable();
</script>
</body>
</html>
